# 콘솔 로그 레벨 변경
#logging:
#  level:
#    root: debug

# spring.application.name=hello-spring

# Spring 이외의 Custom 설정
app:
  jwt:
    issuer: hello-spring
    # jwt 암호화 시키는 key, 너무 짧아도, 뻔해도 안됨. => 유추할 수 없는 데이터
    # secret-key: spring-security-secret-key-random-token-key
    secret-key: sadn9xuin29dx29sd0x2fje9p2j90v40tafjdasjo22

# mybatis 연동 설정
mybatis:
  # mybatis 설정 파일 위치 지정.
  config-location: classpath:mybatis-config.xml
  # mapper 파일들의 위치 지정.
  mapper-locations: classpath:com/ktdsuniversity/edu/**/mapper/*Mapper.xml

spring:
  servlet:
    multipart: # 파일업로드 용량 정책 설정.
      # Spring Server가 한 번에 받을 수 있는 최대 용량
      max-file-size: 150MB
      # 파일 업로드를 할 수 있는 최대 용량
      max-request-size: 50MB
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    driver-class-name: oracle.jdbc.driver.OracleDriver
    username: SPRING_BOOT
    password: 1234
  application:
    name: hello-spring
  security:
    oauth2:
      client:
        # 개인정보 조회 요청을 하기 위해 인증 절차를 거치는 설정.
        registration:
        # 요청하는 oauth서비스를 식별할 수 있는 아이디 작성.
          naver:
            # 인증 아이디와 인증 키 설정
            client-id: lN8dZd8MNztZ1iz2tNPu
            client-secret: QItDK5zAQV
            # 사용자의 네이버 로그인 콜백URL 지정(네이버 로그인의 결과)
            redirect-uri: http://192.168.211.20:8080/login/oauth2/code/naver
            # 사용자의 네이버 로그인 인증 방식
            authorization-grant-type: authorization_code
            # 사용자로부터 받아올 데이터 설정
            scope: name,email
            # naver oauth를 구분지을 이름 (코드))
            client-name: Naver
        # 인증 절차를 거친 이후 요청한 개인 정보를 받아오는 설정
        provider:
          naver:
            # oauth token 취득 URL
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            # 로그인한 회원의 개인 정보 취득 URL
            user-info-uri: https://openapi.naver.com/v1/nid/me
            # naver 전용(oauth2를 통한 개인정보의 추득 결과는 JSON으로 반환)
            # 기본방식 - {email: "", name: "", age: "" }
            # naver 방식{response: {email: "", name: ""}}
            # 개인정보 취득 결과가 들어있는 json Key 설정.
            user-name-attribute: response


